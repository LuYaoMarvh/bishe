<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NL2SQL 智能查询系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="layout-container">
        <!-- 顶部导航栏（含数据库选择器） -->
        <div class="top-navbar">
            <div style="display: flex; align-items: center; gap: 16px;">
                <h1>
                    <span></span>
                    NL2SQL 智能查询系统
                </h1>
                <!-- 数据库快速切换下拉菜单 -->
                <div class="db-selector-wrapper">
                    <button class="db-selector-btn" onclick="toggleDBDropdown()" id="dbSelectorBtn">
                        <span id="currentDBIcon"></span>
                        <span id="currentDBName">加载中...</span>
                        <span class="dropdown-arrow">▼</span>
                    </button>
                    <div class="db-dropdown" id="dbDropdown" style="display: none;">
                        <div class="db-dropdown-header">切换数据库</div>
                        <div class="db-dropdown-list" id="dbDropdownList">
                            <!-- 动态加载 -->
                        </div>
                        <div class="db-dropdown-footer">
                            <button class="db-dropdown-add" onclick="openAddDatabase()">
                                添加数据库
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="toggleHistory()">
                    <span id="history-toggle-icon"></span> 历史
                </button>
                <button class="nav-btn" onclick="openSettings()">设置</button>
                <button class="nav-btn" onclick="exportResults()">导出</button>
            </div>
        </div>

        <div class="main-container">
            <!-- 左侧历史面板 -->
            <div class="history-panel" id="historyPanel">
                <div class="history-header">
                    查询历史
                    <button class="clear-history-btn" onclick="clearHistory()" title="清空历史">

                    </button>
                </div>
                <div class="history-list" id="historyList">
                    <div class="history-placeholder">暂无历史记录</div>
                </div>
            </div>

            <!-- 中间内容区 -->
            <div class="content-area">
                <!-- 仪表盘 -->
                <div class="dashboard" id="dashboard">
                    <div class="dashboard-card">
                        <div class="card-label">查询总数</div>
                        <div class="card-value" id="stat-total">-</div>
                    </div>
                    <div class="dashboard-card green">
                        <div class="card-label">成功率</div>
                        <div class="card-value" id="stat-success">-</div>
                    </div>
                    <div class="dashboard-card orange">
                        <div class="card-label">澄清次数</div>
                        <div class="card-value" id="stat-clarify">-</div>
                    </div>
                    <div class="dashboard-card blue">
                        <div class="card-label">平均响应</div>
                        <div class="card-value" id="stat-time">-</div>
                    </div>
                </div>

                <!-- 双栏布局 -->
                <div class="dual-pane">
                    <!-- 左栏：输入+SQL -->
                    <div class="left-pane">
                        <div class="query-input-section">
                            <div class="section-title">
                                 输入您的问题
                            </div>
                            <div class="input-wrapper">
                                <textarea
                                    class="query-input"
                                    id="queryInput"
                                    placeholder="例如：查询每个客户的订单数量..."
                                    rows="3"
                                    onkeydown="handleInputKeydown(event)"
                                ></textarea>
                                <button class="send-btn" onclick="sendQuery()" id="sendBtn">
                                    <span id="sendBtnText">发送</span>
                                    <span id="sendBtnLoader" style="display: none;">⏳</span>
                                </button>
                            </div>

                            <div class="example-questions">
                                <button class="example-btn" onclick="fillExample('查询所有客户的姓名和邮箱')">
                                    查询所有客户信息
                                </button>
                                <button class="example-btn" onclick="fillExample('统计每个客户的订单数量')">
                                    统计订单数量
                                </button>
                                <button class="example-btn" onclick="fillExample('查找销售额最高的前10个客户')">
                                    查找高价值客户
                                </button>
                                <button class="example-btn" onclick="fillExample('显示最近三个月的销售趋势')">
                                    显示销售趋势
                                </button>
                            </div>
                        </div>

                        <div class="sql-display-section" id="sqlSection">
                            <div class="sql-header">
                                <div class="sql-title"> 生成的 SQL 查询</div>
                                <button class="copy-btn" onclick="copySQL()" id="copyBtn">
                                     复制
                                </button>
                            </div>
                            <pre class="sql-code" id="sqlCode">-- SQL 查询将在这里显示</pre>
                        </div>
                    </div>

                    <!-- 右栏：结果+答案 -->
                    <div class="right-pane">
                        <div class="result-table-section" id="resultSection">
                            <div class="section-title">
                                 查询结果
                            </div>
                            <div id="resultContent">
                                <div class="empty-state">
                                    <div class="empty-icon"></div>
                                    <div class="empty-text">输入问题开始查询</div>
                                </div>
                            </div>
                        </div>

                        <div class="answer-section" id="answerSection" style="display: none;">
                            <div class="section-title">
                                 结论与分析
                            </div>
                            <div class="answer-content" id="answerContent"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 澄清对话模态框 -->
    <div class="modal" id="clarificationModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3> 需要澄清</h3>
            </div>
            <div class="modal-body">
                <p id="clarificationQuestion"></p>
                <div class="clarification-options" id="clarificationOptions"></div>
                <div class="clarification-custom">
                    <input
                        type="text"
                        class="clarification-input"
                        id="clarificationCustom"
                        placeholder="或直接输入您的答案..."
                    />
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="skipClarification()">跳过</button>
                <button class="modal-btn primary" onclick="submitClarification()">确认</button>
            </div>
        </div>
    </div>

    <!-- 设置模态框（含数据库管理标签） -->
    <div class="modal" id="settingsModal" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3> 系统设置</h3>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            <div class="modal-body">
                <!-- 标签页导航 -->
                <div class="settings-tabs">
                    <button class="settings-tab active" onclick="switchSettingsTab('basic', event)">
                        基本设置
                    </button>
                    <button class="settings-tab" onclick="switchSettingsTab('database', event)">
                        数据库管理
                    </button>
                    <button class="settings-tab" onclick="switchSettingsTab('features', event)">
                        功能开关
                    </button>
                </div>

                <!-- 基本设置 -->
<!--                <div class="settings-tab-content" id="settings-tab-basic">-->
<!--                    <div class="setting-item">-->
<!--                        <label class="setting-label">数据库连接状态</label>-->
<!--                        <div class="setting-value db-status">-->
<!--                            {% if db_status.connected %}-->
<!--                            <span class="status-badge success">✓ 已连接</span>-->
<!--                            <span class="status-info">{{ db_status.database }} ({{ db_status.tables_count }} 张表)</span>-->
<!--                            {% else %}-->
<!--                            <span class="status-badge error">✗ 连接失败</span>-->
<!--                            <span class="status-info">{{ db_status.error }}</span>-->
<!--                            {% endif %}-->
<!--                        </div>-->
<!--                    </div>-->
<!--                    <div class="setting-item">-->
<!--                        <label class="setting-label">LLM 模型</label>-->
<!--                        <select class="setting-select">-->
<!--                            <option selected>通义千问 (Qwen-Max)</option>-->
<!--                            <option>DeepSeek Chat</option>-->
<!--                            <option>GPT-4</option>-->
<!--                        </select>-->
<!--                    </div>-->
                    <div class="setting-item">
                        <label class="setting-label">统计数据</label>
                        <button class="btn btn-secondary btn-sm" onclick="resetStatistics()">
                             重置统计数据
                        </button>
                    </div>
                </div>

                <!-- 数据库管理 -->
                <div class="settings-tab-content" id="settings-tab-database" style="display: none;">
                    <div class="db-manager-header">
                        <h4>数据库列表</h4>
                        <button class="btn btn-primary btn-sm" onclick="openAddDatabase()">
                             添加数据库
                        </button>
                    </div>
                    <div class="db-list" id="dbManagementList"></div>
                </div>

                <!-- 功能开关 -->
                <div class="settings-tab-content" id="settings-tab-features" style="display: none;">
                    <div class="setting-item">
                        <label class="setting-label">功能开关</label>
                        <div class="setting-toggles">
                            <label class="toggle-item">
                                <input type="checkbox" checked>
                                <span>启用歧义消解</span>
                            </label>
                            <label class="toggle-item">
                                <input type="checkbox" checked>
                                <span>SQL语义检测</span>
                            </label>
                            <label class="toggle-item">
                                <input type="checkbox" checked>
                                <span>上下文记忆</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加数据库模态框 -->
    <div class="modal" id="addDatabaseModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3> 添加新数据库</h3>
                <button class="modal-close" onclick="closeAddDatabase()">✕</button>
            </div>
            <div class="modal-body">
                <form id="addDatabaseForm">
                    <div class="form-group">
                        <label class="form-label">数据库ID *</label>
                        <input type="text" class="form-input" id="dbId"
                               placeholder="例如：studentdb（唯一标识）" required>
                        <small>用于内部识别，使用小写字母和数字</small>
                    </div>

                    <div class="form-group">
                        <label class="form-label">数据库名称 *</label>
                        <input type="text" class="form-input" id="dbName"
                               placeholder="例如：student_management" required>
                        <small>MySQL 中的实际数据库名</small>
                    </div>

                    <div class="form-group">
                        <label class="form-label">显示名称 *</label>
                        <input type="text" class="form-input" id="dbDisplayName"
                               placeholder="例如：学生信息管理系统" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">图标（可选）</label>
                        <input type="text" class="form-input" id="dbIcon"
                               placeholder="输入 emoji，例如：📚" maxlength="2">
                    </div>

                    <div class="form-group">
                        <label class="form-label">描述（可选）</label>
                        <input type="text" class="form-input" id="dbDescription"
                               placeholder="简短描述这个数据库">
                    </div>

                    <div class="form-group">
                        <label class="form-label">主机地址 *</label>
                        <input type="text" class="form-input" id="dbHost"
                               value="localhost" required>
                    </div>

                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 12px;">
                        <div class="form-group">
                            <label class="form-label">用户名 *</label>
                            <input type="text" class="form-input" id="dbUser"
                                   value="root" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">端口 *</label>
                            <input type="number" class="form-input" id="dbPort"
                                   value="3306" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="dbPassword"
                               placeholder="数据库密码（可选）">
                    </div>

                    <div id="testConnectionResult" style="margin-top: 16px; display: none;"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="modal-btn secondary" onclick="testDatabaseConnection()">
                     测试连接
                </button>
                <button type="button" class="modal-btn primary" onclick="submitAddDatabase(event)">
                     保存并连接
                </button>
            </div>
        </div>
    </div>

    <!-- 切换数据库确认模态框 -->
    <div class="modal" id="switchDBModal" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <div class="modal-header">
                <h3>切换数据库</h3>
            </div>
            <div class="modal-body">
                <p>确定要切换到数据库 <strong id="switchDBName"></strong> 吗？</p>
                <p style="color: #999; font-size: 14px; margin-top: 8px;">
                    切换后将重新加载 Schema，当前会话将被清空。
                </p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="closeSwitchDB()">取消</button>
                <button class="modal-btn primary" onclick="confirmSwitchDB()">确认切换</button>
            </div>
        </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在处理您的请求...</div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
